<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebPayroll</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div>
                <span class="badge">ระบบเงินเดือนพนักงาน</span>
                <p style="margin: 8px 0 0; color: var(--muted);">จัดการข้อมูลพนักงาน คำนวณเงินเดือน และดูรายการรับจ่ายอย่างสะดวก</p>
            </div>
            <div class="actions">
                <button class="button">เก็บข้อมูล</button>
                <button class="button--secondary">Save ทั้งหมด</button>
                <button class="button--secondary" style="color: var(--danger); border-color: rgba(255, 71, 87, 0.2);">ออกจากระบบ</button>
            </div>
        </div>

        <div class="grid layout-2">
            <section class="card">
                <h2>ค้นหาพนักงาน</h2>
                <div class="form-grid">
                    <div class="form-row">
                        <div>
                            <label for="companyId">รหัสบริษัท</label>
                            <input id="companyId" type="text" value="0" />
                        </div>
                        <div>
                            <label for="department">ฝ่าย</label>
                            <select id="department">
                                <option>ฝ่ายการเงิน</option>
                                <option>ฝ่ายบุคคล</option>
                                <option>ฝ่ายไอที</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div>
                            <label for="division">แผนก</label>
                            <select id="division">
                                <option>แผนกบัญชี</option>
                                <option>แผนกอสังหาริมทรัพย์</option>
                                <option>แผนกสนับสนุน</option>
                            </select>
                        </div>
                        <div>
                            <label for="employeeType">ประเภทพนักงาน</label>
                            <select id="employeeType">
                                <option>ประจำ</option>
                                <option>สัญญาจ้าง</option>
                                <option>พาร์ทไทม์</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div>
                            <label for="searchName">ชื่อ / ค้นหา</label>
                            <input id="searchName" type="text" placeholder="ชื่อนามสกุล หรือรหัสพนักงาน" />
                        </div>
                        <div class="checkbox-group">
                            <input id="useFilter" type="checkbox" />
                            <label for="useFilter">คัดกรองข้อมูล</label>
                        </div>
                    </div>
                </div>

                <table class="table">
                    <thead>
                        <tr>
                            <th>รหัส</th>
                            <th>ชื่อ - สกุล</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>001</td>
                            <td>สมชาย ใจดี</td>
                        </tr>
                        <tr>
                            <td>002</td>
                            <td>นฤเบศร์ สุขใจ</td>
                        </tr>
                        <tr>
                            <td>003</td>
                            <td>ปรียานุช แสงทอง</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section class="card">
                <h2>ข้อมูลเงินเดือนพนักงาน</h2>
                <div class="card details-card">
                    <div class="form-grid">
                        <div class="form-row">
                            <div>
                                <label for="employeeName">ชื่อพนักงาน</label>
                                <input id="employeeName" type="text" placeholder="พนักงานตัวอย่าง" />
                            </div>
                            <div>
                                <label for="position">ตำแหน่ง</label>
                                <input id="position" type="text" placeholder="ผู้จัดการ" />
                            </div>
                        </div>

                        <div class="form-row">
                            <div>
                                <label for="employmentType">ประเภทพนักงาน</label>
                                <input id="employmentType" type="text" value="ประจำ" />
                            </div>
                            <div>
                                <label for="startDate">วันที่เริ่มงาน</label>
                                <input id="startDate" type="date" />
                            </div>
                        </div>

                        <div class="form-row">
                            <div>
                                <label for="installments">จำนวนงวดเงินให้ต่อปี</label>
                                <select id="installments">
                                    <option>12</option>
                                    <option>6</option>
                                    <option>24</option>
                                </select>
                            </div>
                            <div>
                                <label for="firstPayment">เงินเดือนที่ได้รับจ่ายครั้งแรก</label>
                                <input id="firstPayment" type="text" placeholder="25,000" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section-tabs">
                    <div class="tab active" data-target="incomeTab">รายรับ</div>
                    <div class="tab" data-target="deductTab">รายการหัก</div>
                </div>

                <div class="tab-content">
                    <div class="tab-panel active" id="incomeTab">
                        <div class="card">
                            <h3 style="margin-top:0; font-size:1rem;">รายการรับ</h3>
                            <div class="form-row sm">
                                <div>
                                    <select>
                                        <option>เงินเดือน</option>
                                        <option>โบนัส</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>ค่าคอมมิชชั่น</option>
                                        <option>เงินเพิ่ม</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>ค่าล่วงเวลา</option>
                                        <option>เงินพิเศษ</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>เงินบำรุง</option>
                                        <option>เงินช่วยเหลือ</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>เงินอื่นๆ</option>
                                        <option>โบนัสพิเศษ</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tab-panel" id="deductTab">
                        <div class="card">
                            <h3 style="margin-top:0; font-size:1rem;">รายการหัก</h3>
                            <div class="form-row sm">
                                <div>
                                    <select>
                                        <option>เงินสมทบ</option>
                                        <option>ค่าเบี้ยเลี้ยง</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>เงินหักอื่น</option>
                                        <option>ค่าเดินทาง</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>ภาษี</option>
                                        <option>ประกันสังคม</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>เงินกู้</option>
                                        <option>ค่าปรับ</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                            <div class="form-row sm" style="margin-top: 12px;">
                                <div>
                                    <select>
                                        <option>เงินหักอื่นๆ</option>
                                        <option>ค่าใช้จ่าย</option>
                                    </select>
                                </div>
                                <div>
                                    <input type="text" placeholder="จำนวน" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script>
        const tabButtons = document.querySelectorAll('.section-tabs .tab');
        const tabPanels = document.querySelectorAll('.tab-panel');

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const targetId = button.dataset.target;
                if (!targetId) return;

                tabButtons.forEach(btn => btn.classList.toggle('active', btn === button));
                tabPanels.forEach(panel => panel.classList.toggle('active', panel.id === targetId));
            });
        });
    </script>
</body>
</html>
